<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEAPATH RT Scan</title>
<style>
/* ── Layout ───────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden;background:#f4f6f9;color:#222}
#sidebar{width:235px;background:#1e2940;color:#cdd6f4;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#main{flex:1;overflow-y:auto;padding:20px 24px}

/* ── Sidebar ──────────────────────────────────────────────────────── */
.sb-title{padding:15px 14px 10px;font-size:14px;font-weight:700;color:#fff;letter-spacing:.3px;border-bottom:1px solid #2d3e5a}
.sb-btn{display:block;width:calc(100% - 20px);margin:8px 10px 0;padding:7px 10px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;text-align:left}
.sb-btn-primary{background:#2e5f9e;color:#fff}
.sb-btn-primary:hover{background:#3a74bf}
.sb-btn-secondary{background:#2d3e5a;color:#cdd6f4}
.sb-btn-secondary:hover{background:#3a4f72;color:#fff}
.sb-section{padding:12px 14px 4px;font-size:10px;text-transform:uppercase;color:#6a7d9e;letter-spacing:.7px}
.sb-report{display:block;padding:7px 14px;cursor:pointer;border-left:3px solid transparent;font-size:12px;color:#aab4c8;line-height:1.4}
.sb-report:hover{background:#253350;color:#fff}
.sb-report.active{border-left-color:#4a9eed;color:#fff;background:#253350}
.sb-report small{display:block;font-size:10px;color:#6a7d9e;margin-top:1px}

/* ── Cards ────────────────────────────────────────────────────────── */
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:16px;overflow:hidden}
.card-hdr{background:#1F3864;color:#fff;padding:8px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:14px}
h2.pg-title{font-size:17px;color:#1F3864;margin-bottom:16px;font-weight:600}
.summary-grid{display:flex;gap:28px;flex-wrap:wrap}
.summary-item label{font-size:10px;color:#888;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}

/* ── Tables ───────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse}
th{background:#2E5F9E;color:#fff;padding:6px 8px;text-align:left;font-size:11px;font-weight:600}
td{padding:5px 8px;border-bottom:1px solid #eee;vertical-align:top;font-size:12px}
tr:hover td{background:#f0f4ff}
.mono{font-family:Consolas,monospace;font-size:11px}

/* ── Forms ────────────────────────────────────────────────────────── */
.form-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-end;flex-wrap:wrap}
.ig{flex:1;min-width:130px}
.ig label{font-size:11px;color:#555;display:block;margin-bottom:3px}
input[type=text],input[type=number],select{padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;width:100%}
.hint{font-size:10px;color:#999;margin-top:2px}
.btn{padding:7px 16px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.btn-primary{background:#2E5F9E;color:#fff}.btn-primary:hover{background:#3a74bf}
.btn-success{background:#2d7a3a;color:#fff}.btn-success:hover{background:#389a47}
.btn-sm{padding:3px 10px;font-size:11px;background:#eee;color:#333;border:none;border-radius:3px;cursor:pointer}
.btn-sm:hover{background:#ddd}

/* ── Scan log ─────────────────────────────────────────────────────── */
#scan-log{background:#1e1e2e;color:#a6e3a1;font-family:Consolas,monospace;font-size:11px;padding:12px;border-radius:6px;height:240px;overflow-y:auto;line-height:1.6;white-space:pre-wrap;display:none;margin-top:12px}

/* ── Alerts ───────────────────────────────────────────────────────── */
.alert-error{padding:5px 10px;border-radius:4px;margin-bottom:4px;font-size:12px;background:#fee;border-left:3px solid #c00;color:#900}
.alert-warn{padding:5px 10px;border-radius:4px;margin-bottom:4px;font-size:12px;background:#fffae6;border-left:3px solid #c8a000;color:#7a5000}
.alert-ok{background:#e8f5e9;color:#2d7a3a;padding:8px 12px;border-radius:4px;font-size:12px}

/* ── Badges ───────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.b-ok{background:#d5e8d4;color:#2d6a2d}
.b-off{background:#f0f0f0;color:#888}
.b-warn{background:#fff3cd;color:#7a5000}
.slice-rt{background:#e1d5e7;color:#4a0072;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:bold}
.slice-nort{background:#d5e8d4;color:#2d6a2d;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:bold}
.ptp-ok{color:#2d7a3a;font-weight:600}
.ptp-err{color:#c00;font-weight:600}

/* ── CPU map ──────────────────────────────────────────────────────── */
.cpumap{padding:10px 14px 10px}
.cpumap h4{font-size:12px;color:#1F3864;margin-bottom:3px}
.cpumap .meta{font-size:11px;color:#666;margin-bottom:8px}
.legend{font-size:11px;color:#555;margin-bottom:8px;line-height:2.2}
.legend .cpu-cell{display:inline-flex;width:24px;height:18px;align-items:center;justify-content:center;font-size:9px;border-radius:3px;vertical-align:middle}
.cmap{border-collapse:separate;border-spacing:2px 2px}
.ch{background:none;color:#888;font-size:9px;text-align:center;padding:0 1px;border:none;font-weight:normal}
.rl{background:none;color:#aaa;font-size:9px;text-align:right;padding:0 3px;border:none;font-weight:normal;white-space:nowrap}
.sep td{height:4px;border:none;background:transparent}
.cpu-cell{width:36px;height:36px;text-align:center;vertical-align:middle;border-radius:5px;cursor:default;border:1px solid rgba(0,0,0,.08)}
.cpu-num{font-size:8px;opacity:.7;line-height:1}
.cpu-lbl{font-size:11px;font-weight:bold;line-height:1.3}
.cpu-rt    {background:#7b2d8b;color:#fff}
.cpu-nort  {background:#2d6a2d;color:#fff}
.cpu-vm    {background:#1a5a8a;color:#fff}
.cpu-rt-iso  {background:repeating-linear-gradient(45deg,#7b2d8b,#7b2d8b 5px,#c8a000 5px,#c8a000 10px);color:#fff}
.cpu-nort-iso{background:repeating-linear-gradient(45deg,#2d6a2d,#2d6a2d 5px,#c8a000 5px,#c8a000 10px);color:#fff}
.cpu-vm-iso  {background:repeating-linear-gradient(45deg,#1a5a8a,#1a5a8a 5px,#c8a000 5px,#c8a000 10px);color:#fff}
/* Dimmed = vCPU annotated as non-RT */
.cpu-rt-dim  {background:#c49ad4;color:#fff}
.cpu-nort-dim{background:#7ab87a;color:#fff}
.cpu-vm-dim  {background:#7a9ab8;color:#fff}
.cpu-iso   {background:#c8a000;color:#222}
.cpu-sys   {background:#e0e0e0;color:#555}
.cpu-conflict{background:#c00;color:#fff}
.cpu-empty {background:transparent;border:none}

/* ── Annotations ──────────────────────────────────────────────────── */
.ann-vm{margin-bottom:10px;border:1px solid #e0e8f0;border-radius:5px;overflow:hidden}
.ann-vm-hdr{background:#f0f4ff;padding:6px 10px;font-size:12px;font-weight:600;color:#1F3864;display:flex;justify-content:space-between;align-items:center}
.ann-vcpus{padding:8px 10px;display:flex;flex-wrap:wrap;gap:8px}
.ann-vcpu{display:flex;align-items:center;gap:4px;font-size:11px;background:#f8f9fa;padding:3px 8px;border-radius:3px;border:1px solid #ddd;cursor:pointer}
.ann-vcpu input{cursor:pointer}
.ann-hint{font-size:11px;color:#666;margin-bottom:10px}

/* ── Compare ──────────────────────────────────────────────────────── */
.diff-sum{padding:9px 14px;font-size:13px;font-weight:600;border-radius:5px;margin-bottom:14px}
.diff-sum.ok{background:#e8f5e9;color:#2d7a3a}
.diff-sum.chg{background:#fff3cd;color:#7a5000}
.added{color:#2d7a3a;font-weight:600}
.removed{color:#c00;font-weight:600}
.modified{color:#7a5000;font-weight:600}
pre{background:#1e1e2e;color:#cdd6f4;padding:12px;font-size:11px;overflow-x:auto;line-height:1.5;border-radius:4px;margin:0}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-title">SEAPATH RT Scan</div>
  <button class="sb-btn sb-btn-primary"  onclick="showScan()">+ New scan</button>
  <button class="sb-btn sb-btn-secondary" onclick="showCompare()">⇄ Compare reports</button>
  <div class="sb-section">Reports</div>
  <div id="report-list"><div style="padding:10px 14px;font-size:11px;color:#6a7d9e">Loading…</div></div>
</div>

<div id="main"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════
let reports         = [];     // list of report metadata (from /api/reports)
let currentReport   = null;   // full report JSON (from /api/reports/<id>)
let currentId       = null;   // report id currently displayed
let annotations     = {};     // {vm_name: [vcpu_idx, ...]} — which vCPUs are RT
let currentView     = 'scan'; // 'scan' | 'report' | 'compare'

// ══════════════════════════════════════════════════════════════════
// API helpers
// ══════════════════════════════════════════════════════════════════
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

async function refreshReports() {
  reports = await api('GET', '/api/reports');
  renderSidebar();
}

async function loadReport(id) {
  currentId     = id;
  currentReport = await api('GET', `/api/reports/${id}`);
  annotations   = currentReport.annotations || {};
  currentView   = 'report';
  renderSidebar();
  renderReport();
}

async function saveAnnotations() {
  if (!currentId) return;
  await api('PUT', `/api/reports/${currentId}/annotations`, annotations);
  refreshAlertsCpuMap();
}

// ══════════════════════════════════════════════════════════════════
// Sidebar
// ══════════════════════════════════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('report-list');
  if (!reports.length) {
    el.innerHTML = '<div style="padding:10px 14px;font-size:11px;color:#6a7d9e">No reports yet.</div>';
    return;
  }
  el.innerHTML = reports.map(r =>
    `<div class="sb-report ${r.id === currentId ? 'active' : ''}" onclick="loadReport('${r.id}')">
       ${r.generated_at}
       <small>${r.n_hosts} node(s) · ${r.n_running}/${r.n_vms} running</small>
     </div>`
  ).join('');
}

// ══════════════════════════════════════════════════════════════════
// Scan view
// ══════════════════════════════════════════════════════════════════
function showScan() {
  currentView = 'scan';
  renderSidebar();
  document.getElementById('main').innerHTML = `
  <h2 class="pg-title">New scan</h2>
  <div class="card">
    <div class="card-hdr">Connection parameters</div>
    <div class="card-body">
      <div class="form-row">
        <div class="ig" style="flex:2">
          <label>Cluster nodes (comma-separated hostnames or IPs)</label>
          <input type="text" id="s-hosts" placeholder="ccv1,ccv2,ccv3">
        </div>
        <div class="ig">
          <label>SSH user</label>
          <input type="text" id="s-user" value="virtu">
        </div>
        <div class="ig" style="flex:0;min-width:70px">
          <label>Port</label>
          <input type="number" id="s-port" value="22">
        </div>
      </div>
      <div class="form-row">
        <div class="ig" style="flex:2">
          <label>SSH private key path</label>
          <input type="text" id="s-key" placeholder="/data/ssh/id_rsa">
          <div class="hint">In Docker: keys are in /data/ssh/ — use e.g. /data/ssh/id_rsa</div>
        </div>
        <div class="ig">
          <label>Password <span style="color:#999">(if no key)</span></label>
          <input type="password" id="s-password" placeholder="">
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px">
          <input type="checkbox" id="s-running-only"> Only collect running VMs
        </label>
      </div>
      <button class="btn btn-primary" onclick="startScan()">Launch scan</button>
    </div>
  </div>
  <div id="scan-log"></div>`;
}

async function startScan() {
  const params = {
    hosts:        document.getElementById('s-hosts').value.trim(),
    user:         document.getElementById('s-user').value.trim(),
    key:          document.getElementById('s-key').value.trim(),
    password:     document.getElementById('s-password').value.trim(),
    port:         parseInt(document.getElementById('s-port').value) || 22,
    running_only: document.getElementById('s-running-only').checked,
  };

  const log = document.getElementById('scan-log');
  log.style.display = 'block';
  log.textContent   = 'Starting scan…\n';

  const { scan_id } = await api('POST', '/api/scan', params);
  if (!scan_id) { log.textContent += 'ERROR: could not start scan.\n'; return; }

  // Stream progress via Server-Sent Events
  const es = new EventSource(`/api/scan/${scan_id}/stream`);
  es.onmessage = async (e) => {
    const ev = JSON.parse(e.data);
    if (ev.type === 'log')  { log.textContent += ev.msg + '\n'; log.scrollTop = 9999; }
    if (ev.type === 'error'){ log.textContent += '\nERROR: ' + ev.msg + '\n'; es.close(); }
    if (ev.type === 'done') {
      log.textContent += '\nReport saved. Loading…\n';
      es.close();
      await refreshReports();
      await loadReport(ev.report_id);
    }
  };
}

// ══════════════════════════════════════════════════════════════════
// Report view
// ══════════════════════════════════════════════════════════════════
function renderReport() {
  const r    = currentReport;
  const nRun = r.vms.filter(v => v.state.includes('running')).length;

  document.getElementById('main').innerHTML = `
  <h2 class="pg-title">Report — ${r.generated_at}</h2>

  <div class="card">
    <div class="card-hdr">Summary</div>
    <div class="card-body">
      <div class="summary-grid">
        <div><label>Generated</label><b>${r.generated_at}</b></div>
        <div><label>Scan host</label><b>${r.local_host}</b></div>
        <div><label>Nodes</label><b>${r.hosts.length}</b></div>
        <div><label>VMs</label><b>${nRun} running / ${r.vms.length} total</b></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr">Alerts <span id="alert-badge"></span></div>
    <div class="card-body" id="alerts-content"></div>
  </div>

  <div class="card">
    <div class="card-hdr">
      RT vCPU annotation
      <button class="btn-sm" onclick="toggleEl('ann-body')">show / hide</button>
    </div>
    <div id="ann-body" style="display:none">
      <div class="card-body">
        <p class="ann-hint">
          Check which vCPUs handle real-time tasks per VM.
          Unchecked vCPUs are treated as non-RT: shown dimmed on the map and excluded from conflict detection.
          Default: all vCPUs are RT.
        </p>
        <div id="ann-panel"></div>
        <div style="margin-top:10px">
          <button class="btn btn-success" onclick="saveAnnotations()">Save annotations</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr">Physical CPU map</div>
    <div id="cpumap-content"></div>
  </div>

  <div class="card">
    <div class="card-hdr">Pacemaker — VirtualDomain resources</div>
    <div class="card-body">${buildPacemakerTable()}</div>
  </div>

  <div class="card">
    <div class="card-hdr">Detailed VM configuration</div>
    <div class="card-body" style="overflow-x:auto">${buildVmTable()}</div>
  </div>

  <div class="card">
    <div class="card-hdr">
      Raw Pacemaker state
      <button class="btn-sm" onclick="toggleEl('raw-pce')">show / hide</button>
    </div>
    <div id="raw-pce" style="display:none">
      <pre>${esc(r.pacemaker_raw || 'Not available')}</pre>
    </div>
  </div>`;

  refreshAlertsCpuMap();
  document.getElementById('ann-panel').innerHTML = buildAnnotationPanel();
}

function refreshAlertsCpuMap() {
  document.getElementById('alerts-content').innerHTML = buildAlerts();
  document.getElementById('cpumap-content').innerHTML = buildAllCpuMaps();
}

function toggleEl(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── Alerts ────────────────────────────────────────────────────────
function buildAlerts() {
  const items = computeAlerts(currentReport, annotations);
  if (!items.length) return '<div class="alert-ok">No alerts</div>';
  return items.map(a => `<div class="alert-${a.level}">${esc(a.msg)}</div>`).join('');
}

function computeAlerts(report, ann) {
  if (!report) return [];
  const out = [];

  // CPU conflict: only RT vCPUs, only within the same host
  const cpuMap = {}; // "host:cpuId" -> Set of vm names
  for (const vm of report.vms) {
    for (const pin of vm.vcpu_pins) {
      if (!isRt(vm.name, pin.vcpu, ann)) continue;
      for (const cid of pin.physical_cpus) {
        const key = `${vm.host}:${cid}`;
        if (!cpuMap[key]) cpuMap[key] = new Set();
        cpuMap[key].add(vm.name);
      }
    }
  }
  for (const [key, names] of Object.entries(cpuMap)) {
    if (names.size > 1) {
      const [host, cid] = key.split(':');
      out.push({level:'error', msg:`CONFLICT ${host} CPU ${cid} shared by RT vCPUs of: ${[...names].join(', ')}`});
    }
  }

  // RT VM configuration checks
  for (const vm of report.vms) {
    const rtSlice = vm.cgroup_partition?.includes('rt') && !vm.cgroup_partition?.includes('nort');
    if (!rtSlice) continue;
    if (!vm.vcpu_pins.length)
      out.push({level:'warn', msg:`${vm.name}: RT VM has no vcpupin`});
    if (vm.memballoon)
      out.push({level:'warn', msg:`${vm.name}: memballoon enabled on RT VM`});
    if (!vm.hugepages)
      out.push({level:'warn', msg:`${vm.name}: hugepages disabled on RT VM`});
    if (!['fifo','sched_fifo'].includes((vm.vcpu_scheduler||'').toLowerCase()))
      out.push({level:'warn', msg:`${vm.name}: scheduler="${vm.vcpu_scheduler||'not set'}" (expected FIFO)`});
  }

  // PTP check
  for (const h of report.hosts) {
    if (!h.ptp_sync_ok)
      out.push({level:'error', msg:`${h.hostname}: ptp4l inactive`});
  }
  return out;
}

// ── Annotation panel ──────────────────────────────────────────────
function buildAnnotationPanel() {
  return currentReport.vms
    .filter(vm => vm.vcpu_pins.length > 0)
    .sort((a,b) => a.name.localeCompare(b.name))
    .map(vm => {
      const sliceCls = vm.cgroup_partition?.includes('nort') ? 'slice-nort'
                     : vm.cgroup_partition?.includes('rt')   ? 'slice-rt' : '';
      const vcpus = vm.vcpu_pins.map(pin => {
        const checked = isRt(vm.name, pin.vcpu, annotations) ? 'checked' : '';
        return `<label class="ann-vcpu">
          <input type="checkbox" ${checked}
            onchange="toggleVcpuRt('${vm.name}',${pin.vcpu},this.checked)">
          vCPU${pin.vcpu} → CPU ${pin.physical_cpus.join(',')}
        </label>`;
      }).join('');
      return `<div class="ann-vm">
        <div class="ann-vm-hdr">
          ${vm.name}
          <span><span class="${sliceCls}">${vm.cgroup_partition||'—'}</span> on ${vm.host}</span>
        </div>
        <div class="ann-vcpus">${vcpus}</div>
      </div>`;
    }).join('') || '<div style="color:#888;font-size:12px">No pinned VMs found.</div>';
}

function toggleVcpuRt(vmName, vcpuIdx, checked) {
  // On first toggle, initialize the annotation with ALL vCPUs as RT
  if (!annotations[vmName]) {
    const vm = currentReport.vms.find(v => v.name === vmName);
    annotations[vmName] = vm ? vm.vcpu_pins.map(p => p.vcpu) : [];
  }
  if (checked) {
    if (!annotations[vmName].includes(vcpuIdx)) annotations[vmName].push(vcpuIdx);
  } else {
    annotations[vmName] = annotations[vmName].filter(i => i !== vcpuIdx);
  }
  // Live-update map and alerts without re-rendering the full page
  refreshAlertsCpuMap();
}

function isRt(vmName, vcpuIdx, ann) {
  // No annotation or empty array = all vCPUs are RT (conservative default)
  if (!ann || !ann[vmName] || ann[vmName].length === 0) return true;
  return ann[vmName].includes(vcpuIdx);
}

// ── CPU map ───────────────────────────────────────────────────────
function buildAllCpuMaps() {
  return currentReport.hosts.map(host => {
    const vmsHere = currentReport.vms.filter(v => v.host === host.hostname);
    return buildCpuGrid(host, vmsHere);
  }).join('');
}

function buildCpuGrid(host, vmsOnHost) {
  if (!host.physical_cores) {
    return `<div class="cpumap"><h4>${host.hostname}</h4>
      <p style="color:#888;font-size:11px;padding:8px 0">No CPU data collected for this node.</p></div>`;
  }

  // Build cpuId -> [{vm, is_rt}] mapping for this host
  const cpuEntries = {};
  for (const vm of vmsOnHost) {
    for (const pin of vm.vcpu_pins) {
      const rt = isRt(vm.name, pin.vcpu, annotations);
      for (const cid of pin.physical_cpus) {
        if (!cpuEntries[cid]) cpuEntries[cid] = [];
        cpuEntries[cid].push({vm, is_rt: rt});
      }
    }
  }

  const isolated = new Set(host.isolated_cpus_list || []);
  const { logical_cpus: n, threads_per_core: thr, physical_cores: phys } = host;
  const COLS = 12;

  let rows = '';
  for (let rs = 0; rs < phys; rs += COLS) {
    const cores = Array.from({length: Math.min(COLS, phys - rs)}, (_,i) => rs + i);
    const hdr = cores.map(c => `<th class="ch">C${String(c).padStart(2,'0')}</th>`).join('');
    const t0  = cores.map(c => cpuCell(c,        cpuEntries, isolated, n)).join('');
    rows += `<tr><th class="rl"></th>${hdr}</tr>`;
    rows += `<tr><th class="rl">T0</th>${t0}</tr>`;
    if (thr === 2) {
      const t1 = cores.map(c => cpuCell(c + phys, cpuEntries, isolated, n)).join('');
      rows += `<tr><th class="rl">T1</th>${t1}</tr>`;
    }
    rows += `<tr class="sep"><td colspan="99"></td></tr>`;
  }

  const ptp = host.ptp_sync_ok
    ? '<span class="ptp-ok">PTP OK</span>'
    : '<span class="ptp-err">PTP INACTIVE</span>';

  return `<div class="cpumap">
    <h4>${host.hostname}</h4>
    <div class="meta">
      ${esc(host.cpu_model?.slice(0,55)||'—')}
      &nbsp;·&nbsp;${phys} cores / ${n} CPUs
      &nbsp;·&nbsp;isolcpus: <code>${host.isolated_cpus||'—'}</code>
      &nbsp;·&nbsp;${ptp}
    </div>
    <div class="legend">
      <span class="cpu-cell cpu-rt">RT</span>&nbsp;/machine/rt&nbsp;&nbsp;
      <span class="cpu-cell cpu-nort">nRT</span>&nbsp;/machine/nort&nbsp;&nbsp;
      <span class="cpu-cell cpu-rt-iso">RT</span>&nbsp;RT+isolated&nbsp;&nbsp;
      <span class="cpu-cell cpu-nort-iso">nRT</span>&nbsp;noRT+isolated&nbsp;&nbsp;
      <span class="cpu-cell cpu-rt-dim">RT</span>&nbsp;non-RT vCPU (annotated)&nbsp;&nbsp;
      <span class="cpu-cell cpu-iso">~~</span>&nbsp;isolated free&nbsp;&nbsp;
      <span class="cpu-cell cpu-sys">·</span>&nbsp;system&nbsp;&nbsp;
      <span class="cpu-cell cpu-conflict">!!</span>&nbsp;conflict
    </div>
    <table class="cmap"><tbody>${rows}</tbody></table>
  </div>`;
}

function cpuCell(cpuId, cpuEntries, isolated, nLogical) {
  if (cpuId >= nLogical) return '<td class="cpu-empty"></td>';

  const entries  = cpuEntries[cpuId] || [];
  const isIso    = isolated.has(cpuId);
  const rtItems  = entries.filter(e => e.is_rt);
  const nrtItems = entries.filter(e => !e.is_rt);
  const rtVms    = [...new Set(rtItems.map(e => e.vm.name))];

  // Conflict: two different VMs have RT vCPUs on this same CPU
  if (rtVms.length > 1) {
    return `<td class="cpu-cell cpu-conflict" title="${rtVms.join(' / ')}">
      <div class="cpu-num">${cpuId}</div><div class="cpu-lbl">!!</div></td>`;
  }

  if (entries.length > 0) {
    const primary  = rtItems.length ? rtItems[0] : nrtItems[0];
    const vm       = primary.vm;
    const hasRt    = rtItems.length > 0;
    const lbl      = vm.name.slice(0, 3);
    const tip      = vm.name + (isIso ? ' + isolated' : '') + (!hasRt ? ' (non-RT)' : '');
    const isRtSlice  = vm.cgroup_partition?.includes('rt')   && !vm.cgroup_partition?.includes('nort');
    const isNortSlice= vm.cgroup_partition?.includes('nort');

    let cls;
    if (!hasRt) {
      // All vCPUs on this cell are non-RT → dim color
      cls = isRtSlice ? 'cpu-rt-dim' : isNortSlice ? 'cpu-nort-dim' : 'cpu-vm-dim';
    } else if (isIso) {
      cls = isRtSlice ? 'cpu-rt-iso' : isNortSlice ? 'cpu-nort-iso' : 'cpu-vm-iso';
    } else {
      cls = isRtSlice ? 'cpu-rt'     : isNortSlice ? 'cpu-nort'     : 'cpu-vm';
    }
    return `<td class="cpu-cell ${cls}" title="${esc(tip)}">
      <div class="cpu-num">${cpuId}</div><div class="cpu-lbl">${lbl}</div></td>`;
  }

  if (isIso)
    return `<td class="cpu-cell cpu-iso" title="CPU ${cpuId} isolated free">
      <div class="cpu-num">${cpuId}</div><div class="cpu-lbl">~~</div></td>`;

  return `<td class="cpu-cell cpu-sys" title="CPU ${cpuId} system">
    <div class="cpu-num">${cpuId}</div><div class="cpu-lbl"></div></td>`;
}

// ── Pacemaker table ───────────────────────────────────────────────
function buildPacemakerTable() {
  const r = currentReport;
  if (!r.pacemaker_vms?.length) return '<em style="color:#888">Not available</em>';
  const cmap = {};
  for (const c of r.pacemaker_constraints || []) {
    if (!cmap[c.vm_name]) cmap[c.vm_name] = [];
    cmap[c.vm_name].push(c);
  }
  const rows = [...r.pacemaker_vms]
    .sort((a,b) => a.name.localeCompare(b.name))
    .map(pvm => {
      const ok = pvm.state.toLowerCase().includes('started') && !pvm.disabled;
      const cls = ok ? 'badge b-ok' : pvm.disabled ? 'badge b-off' : 'badge b-warn';
      const constrs = (cmap[pvm.name]||[])
        .map(c => `${c.constraint_type}→${c.node} (${c.score})`).join(' | ') || '—';
      return `<tr><td><b>${pvm.name}</b></td>
        <td><span class="${cls}">${pvm.state}</span></td>
        <td>${pvm.node||'—'}</td>
        <td class="mono">${constrs}</td></tr>`;
    }).join('');
  return `<table><thead><tr>
    <th>Resource</th><th>State</th><th>Node</th><th>Constraints</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── VM detail table ───────────────────────────────────────────────
function buildVmTable() {
  const kibStr = kib => kib >= 1024*1024 ? `${(kib/1024/1024).toFixed(1)} GiB` : `${Math.round(kib/1024)} MiB`;
  const rows = [...currentReport.vms]
    .sort((a,b) => a.name.localeCompare(b.name))
    .map(vm => {
      const ss  = vm.state.includes('running') ? 'badge b-ok' : 'badge b-off';
      const sc  = vm.cgroup_partition?.includes('nort') ? 'slice-nort'
                : vm.cgroup_partition?.includes('rt')   ? 'slice-rt' : '';
      const pins = vm.vcpu_pins.sort((a,b)=>a.vcpu-b.vcpu).map(p => {
        const rt = isRt(vm.name, p.vcpu, annotations);
        return `vCPU${p.vcpu}→${p.physical_cpus.join(',')}${rt?'':' <em>(non-RT)</em>'}`;
      }).join('<br>') || '<em>not pinned</em>';
      const sched = (vm.vcpu_scheduler||'—') + (vm.vcpu_scheduler_priority ? ` p=${vm.vcpu_scheduler_priority}` : '');
      const emul  = vm.emulator_pin_cpus?.join(',') || '—';
      return `<tr>
        <td><b>${vm.name}</b></td>
        <td><span class="${ss}">${vm.state}</span></td>
        <td>${vm.host}</td>
        <td class="mono">${pins}</td>
        <td class="mono">${sched}</td>
        <td class="mono">${emul}</td>
        <td><span class="${sc}">${vm.cgroup_partition||'—'}</span></td>
        <td>${kibStr(vm.memory_kib)}</td>
        <td>${vm.hugepages ? '✓' : '<span style="color:#888">✗</span>'}</td>
        <td>${vm.memballoon ? '<span style="color:#c00">✓</span>' : '✗'}</td>
      </tr>`;
    }).join('');
  return `<table style="font-size:11px"><thead><tr>
    <th>VM</th><th>State</th><th>Node</th><th>vCPU→phys.</th>
    <th>Sched.</th><th>emulatorpin</th><th>Slice</th>
    <th>RAM</th><th>HP</th><th>Balloon</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

// ══════════════════════════════════════════════════════════════════
// Compare view
// ══════════════════════════════════════════════════════════════════
function showCompare() {
  currentView = 'compare';
  currentId   = null;
  renderSidebar();
  const opts = reports.map(r =>
    `<option value="${r.id}">${r.generated_at} — ${r.n_hosts} node(s), ${r.n_running}/${r.n_vms} VMs</option>`
  ).join('');
  document.getElementById('main').innerHTML = `
  <h2 class="pg-title">Compare two reports</h2>
  <div class="card">
    <div class="card-hdr">Select reports to compare</div>
    <div class="card-body">
      <div class="form-row">
        <div class="ig"><label>Report A (reference / before)</label>
          <select id="cmp-a">${opts}</select></div>
        <div class="ig"><label>Report B (after)</label>
          <select id="cmp-b">${opts}</select></div>
      </div>
      <button class="btn btn-primary" onclick="runCompare()">Compare</button>
    </div>
  </div>
  <div id="cmp-result"></div>`;
  // Pre-select first two reports if available
  if (reports.length >= 2) {
    document.getElementById('cmp-a').value = reports[1].id;
    document.getElementById('cmp-b').value = reports[0].id;
  }
}

async function runCompare() {
  const aId = document.getElementById('cmp-a').value;
  const bId = document.getElementById('cmp-b').value;
  const diff = await api('GET', `/api/compare?a=${aId}&b=${bId}`);
  document.getElementById('cmp-result').innerHTML = buildCompareResult(diff);
}

function buildCompareResult(diff) {
  const noChange = !diff.hosts.length && !diff.vms.length && !diff.pacemaker.length;

  const section = (title, items, rowFn) => {
    if (!items.length) return '';
    return `<div class="card">
      <div class="card-hdr">${title} — ${items.length} change(s)</div>
      <div class="card-body"><table>
        <thead><tr><th>Item</th><th>Change</th><th>Details</th></tr></thead>
        <tbody>${items.map(rowFn).join('')}</tbody>
      </table></div></div>`;
  };

  const cls = c => c === 'added' ? 'added' : c === 'removed' ? 'removed' : 'modified';

  const hostsHtml = section('Hosts', diff.hosts, h => {
    const det = h.fields ? Object.entries(h.fields)
      .map(([k,v]) => `${k}: <em>${v.before}</em> → <b>${v.after}</b>`).join('<br>') : '';
    return `<tr><td><b>${h.host}</b></td>
      <td><span class="${cls(h.change)}">${h.change}</span></td>
      <td class="mono">${det}</td></tr>`;
  });

  const vmsHtml = section('VMs', diff.vms, v => {
    const det = v.fields ? Object.entries(v.fields)
      .map(([k,val]) => `${k}: <em>${JSON.stringify(val.before)}</em> → <b>${JSON.stringify(val.after)}</b>`)
      .join('<br>') : (v.host ? `host: ${v.host}` : '');
    return `<tr><td><b>${v.vm}</b></td>
      <td><span class="${cls(v.change)}">${v.change}</span></td>
      <td class="mono">${det}</td></tr>`;
  });

  const pceHtml = section('Pacemaker', diff.pacemaker, p => {
    const det = p.before ? `<em>${p.before}</em> → <b>${p.after}</b>` : '';
    return `<tr><td><b>${p.vm}</b></td>
      <td><span class="modified">${p.change}</span></td>
      <td class="mono">${det}</td></tr>`;
  });

  return `<div class="diff-sum ${noChange ? 'ok' : 'chg'}">${diff.summary}</div>
    <p style="font-size:11px;color:#888;margin-bottom:14px">
      A: ${diff.a} &nbsp;→&nbsp; B: ${diff.b}
    </p>
    ${hostsHtml}${vmsHtml}${pceHtml}`;
}

// ══════════════════════════════════════════════════════════════════
// Utilities
// ══════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════════
async function init() {
  await refreshReports();
  if (reports.length > 0) {
    await loadReport(reports[0].id);  // auto-load most recent report
  } else {
    showScan();
  }
}

init();
</script>
